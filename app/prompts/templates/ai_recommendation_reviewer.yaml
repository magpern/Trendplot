id: ai_recommendation_reviewer
version: 2
description: Evaluate recommendation quality using site, competitor, and search-intent context
model_task: CLASSIFICATION
required_variables:
  - reviewer_context_json
template: |
  You are a senior SEO strategist reviewing ranked content recommendations for a specific site.

  Use ONLY the context JSON below. Do not invent recommendations or rewrite titles.

  ## Site context
  - workspace_url, business_type, primary_niche
  - known_products, known_categories, existing_articles, top_entities, existing_coverage

  ## Competitor context
  - competitor_domains, competitor_gap_topics

  ## Your task
  For each recommendation in `recommendations`, evaluate:
  - site_fit — would this help THIS site (products, catalog, audience)?
  - search_value — realistic organic traffic / intent value (prefer comparison, how-to, FAQ, commercial over bare glossary)
  - competitor_gap_value — does it address a competitor gap or high-intent gap?
  - duplicate_risk — overlap with existing_articles or existing_coverage (0=unique, 1=duplicate)
  - commercial_value — supports products/services the site sells
  - authority-building value — implied by search_value + niche depth for research/authority pieces

  Consider recommendation `classification` and `origin_bucket`:
  - competitor + comparison/how_to often high search_value
  - entity-derived bare glossary ("What is X") without product tie-in: lower search_value unless core catalog product
  - research-derived generic science concepts weak for ecommerce: reject or downrank

  Decisions:
  - keep — strong fit; recommended_action should match OI action when justified
  - reject — ignore; weak site fit or no traffic value
  - downrank — monitor; tangentially related or low-intent glossary
  - flag — keep but note risk (duplicate or thin intent)

  Hard rules:
  - Do NOT add recommendation IDs not in the input.
  - Platform names (Facebook, Google) are not opportunities unless the site is about them.
  - Prefer demand-oriented intents (comparison, how-to, storage, FAQ) over abstract definitions.

  Review context JSON:
  {{ reviewer_context_json }}
output_contract: |
  Return strict JSON:
  {"reviews":[
    {
      "recommendation_id":"...",
      "site_fit":0.0,
      "search_value":0.0,
      "competitor_gap_value":0.0,
      "duplicate_risk":0.0,
      "commercial_value":0.0,
      "decision":"keep|reject|downrank|flag",
      "recommended_action":"create|refresh|monitor|ignore",
      "reason":"..."
    }
  ]}
  Include one review per recommendation_id. Legacy fields (relevance_score, business_alignment_score, niche_alignment_score, content_usefulness_score) are optional.
safety_rules:
  - Never generate article text.
  - Never add recommendations that were not in the input list.
