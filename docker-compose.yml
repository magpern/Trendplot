services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: seo_worker
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_worker"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  seo-content-worker:
    build: .
    container_name: seo-content-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://seo_user:seo_password@postgres:5432/seo_worker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data: